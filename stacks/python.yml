version: '3.8'

services:
  web:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python app.py"
    volumes:
      - {{DEPLOY_PATH}}:/app
    environment:
      - PYTHONUNBUFFERED=1
{{ENV_VARS}}
{{PORT_MAPPING}}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
{{DEPLOY_LABELS}}
    networks:
      - xpanel-net

networks:
  xpanel-net:
    external: true
