version: '3.8'

services:
  web:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm start"
    volumes:
      - {{DEPLOY_PATH}}:/app
    environment:
      - NODE_ENV=production
      - PORT=3000
{{ENV_VARS}}
{{PORT_MAPPING}}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
{{DEPLOY_LABELS}}
    networks:
      - xpanel-net

networks:
  xpanel-net:
    external: true
