version: '3.8'

services:
  web:
    image: nginx:alpine
{{PORT_MAPPING}}
    volumes:
      - {{DEPLOY_PATH}}:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
{{DEPLOY_LABELS}}
    networks:
      - xpanel-net

networks:
  xpanel-net:
    external: true
