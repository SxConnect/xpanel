version: '3.8'

services:
  web:
    image: php:8.2-apache
    volumes:
      - {{DEPLOY_PATH}}:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
{{ENV_VARS}}
{{PORT_MAPPING}}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
{{DEPLOY_LABELS}}
    networks:
      - xpanel-net

networks:
  xpanel-net:
    external: true
