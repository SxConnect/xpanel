version: '3.8'

services:
  web:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python app.py"
    volumes:
      - /home/xpanel/sites/{{WORKSPACE_ID}}:/app
    environment:
      - PYTHONUNBUFFERED=1
{{ENV_VARS}}
    ports:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.xpanel-{{WORKSPACE_ID}}.rule=Host(`{{DOMAIN}}`)"
        - "traefik.http.routers.xpanel-{{WORKSPACE_ID}}.entrypoints=websecure"
        - "traefik.http.routers.xpanel-{{WORKSPACE_ID}}.tls.certresolver=letsencrypt"
        - "traefik.http.services.xpanel-{{WORKSPACE_ID}}.loadbalancer.server.port=5000"
    networks:
      - xpanel-net

networks:
  xpanel-net:
    external: true