version: '3.8'

services:
  web:
    image: php:8.2-apache
    volumes:
      - /home/xpanel/sites/{{WORKSPACE_ID}}/public:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
{{ENV_VARS}}
    ports:
      - "80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.xpanel-{{WORKSPACE_ID}}.rule=Host(`{{DOMAIN}}`)"
        - "traefik.http.routers.xpanel-{{WORKSPACE_ID}}.entrypoints=websecure"
        - "traefik.http.routers.xpanel-{{WORKSPACE_ID}}.tls.certresolver=letsencrypt"
        - "traefik.http.services.xpanel-{{WORKSPACE_ID}}.loadbalancer.server.port=80"
    networks:
      - xpanel-net

networks:
  xpanel-net:
    external: true